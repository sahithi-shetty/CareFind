<head>
    <meta charset="UTF-8">

    <title>Carefind Splash Screen</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(135deg,
                    #0f172a,
                    #1fa2a6,
                    #0284c7,
                    #0f172a);
            background-size: 400% 400%;
            animation: bgMove 12s ease infinite;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            position: relative;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- VISIBLE MEDICAL PATTERN SYSTEM --- */
        .medical-pattern-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(6, 1fr);
            padding: 20px;
            gap: 20px;
        }

        .med-blueprint {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .med-blueprint svg {
            width: 42px;
            height: 42px;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            /* Uniform visibility configuration (12% to 18% visibility balancing spectrum) */
            opacity: 0.15; 
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
            transform: translateZ(0);
        }

        /* Branding Color Schemes */
        .c-blue svg { stroke: #38bdf8; }
        .c-teal svg { stroke: #0ea5e9; }

        /* Asynchronous floating clusters across coordinate grids */
        .med-blueprint:nth-child(3n+1) svg { animation: slowDriftA 14s ease-in-out infinite alternate; }
        .med-blueprint:nth-child(3n+2) svg { animation: slowDriftB 18s ease-in-out infinite alternate; }
        .med-blueprint:nth-child(3n+3) svg { animation: slowDriftC 16s ease-in-out infinite alternate; }

        /* Multi-directional float configurations */
        @keyframes slowDriftA {
            0% { transform: translateY(0) rotate(0deg) scale(1); }
            100% { transform: translateY(-18px) translateX(6px) rotate(8deg) scale(1.05); }
        }

        @keyframes slowDriftB {
            0% { transform: translateY(12px) translateX(-5px) rotate(0deg); }
            100% { transform: translateY(-12px) translateX(8px) rotate(-12deg); }
        }

        @keyframes slowDriftC {
            0% { transform: translateY(-6px) rotate(-5deg); }
            100% { transform: translateY(15px) translateX(-8px) rotate(10deg); }
        }

        /* Dynamic Center Mask: Protects Logo and Caption Legibility */
        .center-clearance-shield {
            position: absolute;
            width: 550px;
            height: 550px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(15,23,42,0.65) 0%, rgba(30,58,138,0.2) 50%, rgba(0,0,0,0) 70%);
            z-index: 1;
            pointer-events: none;
        }

        /* --- SPLASH CORE INTERFACE LAYERS --- */
        .splash-container {
            text-align: center;
            opacity: 0;
            z-index: 2;
            animation: fadeIn 1.2s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
        }

        .logo {
            width: 450px;
            max-width: 85vw;
            height: auto;
            animation: zoomIn 1.4s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
        }

        .app-name {
            margin-top: 25px;
            color: white;
            font-size: 44px;
            font-weight: 800;
            letter-spacing: 4px;
            text-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
        }

        .tagline {
            color: #93c5fd;
            margin-top: 12px;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .loader {
            width: 50px;
            height: 50px;
            margin: 40px auto 0;
            border: 3.5px solid rgba(255, 255, 255, 0.2);
            border-top: 3.5px solid #38bdf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomIn {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .fade-out {
            animation: fadeOut 0.8s ease forwards;
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(1.05); }
        }
    </style>
</head>
