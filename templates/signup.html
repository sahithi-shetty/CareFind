<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAREFIND - Signup</title>

    <style>
        /* ==========================================================================
           1. Global Layout & Bright Animated Canvas
           ========================================================================== */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            /* Smooth moving linear gradient theme matching login */
            background: linear-gradient(-45deg, #1fa2a6, #2bbbc0, #159397, #4ae5e2);
            background-size: 400% 400%;
            animation: backgroundShimmer 12s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes backgroundShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ambient light illumination overlay */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.45) 0%, rgba(255, 255, 255, 0) 60%);
            z-index: 1;
            pointer-events: none;
        }

        /* Ambient floating dynamic orbs */
        body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0) 70%);
            top: 10%;
            left: 20%;
            z-index: 1;
            animation: orbFloat 16s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.1); }
        }

        /* ==========================================================================
           2. Framing Vector Overlays (Left & Right Sides)
           ========================================================================== */
        .vector-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 2;
            pointer-events: none;
        }

        .side-svg {
            position: absolute;
            height: 90vh;
            width: auto;
            opacity: 0.85;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.1));
            animation: gentleFloat 7s ease-in-out infinite alternate;
        }

        .svg-left {
            left: -30px;
            top: 5%;
        }

        .svg-right {
            right: -30px;
            top: 5%;
            animation-delay: -3.5s;
        }

        @keyframes gentleFloat {
            0% { transform: translateY(0px) scale(1) rotate(0deg); }
            100% { transform: translateY(-20px) scale(1.03) rotate(0.5deg); }
        }

        /* Sparkle Particle Accents */
        .sparkles {
            position: absolute;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0) 70%);
            opacity: 0.45;
            z-index: 2;
            filter: blur(2px);
        }
        .sp-1 { top: 10%; left: 36%; animation: pulseSparkle 4s infinite alternate; }
        .sp-2 { bottom: 6%; right: 34%; animation: pulseSparkle 5s infinite alternate-reverse; }

        @keyframes pulseSparkle {
            0% { opacity: 0.2; transform: scale(0.8) translateY(0); }
            100% { opacity: 0.7; transform: scale(1.25) translateY(-10px); }
        }

        /* ==========================================================================
           3. Premium Dark Teal Signup Card
           ========================================================================== */
        .box {
            width: 410px;
            background: rgba(28, 60, 70, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 45px 35px;
            border-radius: 20px;
            box-shadow: 0 30px 70px rgba(6, 30, 36, 0.55);
            text-align: center;
            box-sizing: border-box;
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
        }

        .box:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 80px rgba(6, 30, 36, 0.65);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .box h2 {
            margin: 0;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #d1f7f5;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .box .subtitle {
            font-size: 15px;
            color: #bceae7;
            margin-top: 6px;
            margin-bottom: 30px;
            opacity: 0.95;
            letter-spacing: 0.3px;
        }

        .box form {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .input-wrapper {
            width: 100%;
            text-align: left;
            margin-bottom: 16px;
        }

        .input-wrapper label {
            display: block;
            color: #bceae7;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        /* ==========================================================================
           4. High-Glow Inputs & Button Framework
           ========================================================================== */
        .box input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(16, 36, 42, 0.8);
            border: 1.5px solid #238991;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            box-shadow: 0 0 14px rgba(0, 187, 249, 0.45);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .box input:focus {
            border-color: #4ef2d2;
            background: rgba(16, 36, 42, 0.95);
            box-shadow: 0 0 22px rgba(78, 242, 210, 0.75);
            transform: scale(1.01);
        }

        .box input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Bright Blue/Cyan Gradient Button */
        .box button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: linear-gradient(135deg, #0096c7, #00b4d8);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 18px rgba(0, 180, 216, 0.45);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .box button:hover {
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            box-shadow: 0 8px 25px rgba(0, 180, 216, 0.65);
            transform: translateY(-1px);
        }
        
        .box button:active {
            transform: translateY(1px);
        }

        .box .footer-links {
            margin-top: 25px;
            font-size: 14.5px;
            color: #a3cbd0;
        }

        .box .footer-links a {
            color: #4ef2d2;
            text-decoration: underline;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .box .footer-links a:hover {
            color: #ffffff;
        }
    </style>
</head>

<body>

    <div class="sparkles sp-1"></div>
    <div class="sparkles sp-2"></div>

    <div class="vector-container">
        <svg class="side-svg svg-left" viewBox="0 0 120 200" fill="none" stroke="#167981" stroke-width="0.8">
            <polygon points="5,30 25,15 45,30 45,60 25,75 5,60" fill="rgba(22,121,129,0.06)" />
            <polygon points="45,30 65,15 85,30 85,60 65,75 45,60" />
            <polygon points="25,75 45,60 45,90 25,105 5,90 5,60" />
            <polygon points="45,90 65,75 85,90 85,120 65,135 45,120" fill="rgba(22,121,129,0.06)" />
            <polygon points="5,145 25,130 45,145 45,175 25,190 5,175" />

            <circle cx="25" cy="15" r="1.5" fill="#167981" />
            <circle cx="85" cy="30" r="1.5" fill="#167981" />
            <circle cx="25" cy="105" r="1.5" fill="#167981" />
            <circle cx="65" cy="135" r="1.5" fill="#167981" />

            <path d="M22,42 C20,39 17,39 16,41 C15,43 17,46 22,49 C27,46 29,43 28,41 C27,39 24,39 22,42 Z" fill="#167981" stroke="none"/>
            <path d="M52,41 H58 V47 H52 Z M55,38 V50" stroke="#167981" stroke-width="1.5"/>
        </svg>

        <svg class="side-svg svg-right" viewBox="0 0 120 200" fill="none" stroke="#167981" stroke-width="0.8">
            <polygon points="35,30 55,15 75,30 75,60 55,75 35,60" />
            <polygon points="75,30 95,15 115,30 115,60 95,75 75,60" fill="rgba(22,121,129,0.06)" />
            <polygon points="55,75 75,60 75,90 55,105 35,90 35,60" />
            <polygon points="75,90 95,75 115,90 115,120 95,135 75,120" />

            <circle cx="55" cy="15" r="1.5" fill="#167981" />
            <circle cx="35" cy="60" r="1.5" fill="#167981" />
            <circle cx="115" cy="90" r="1.5" fill="#167981" />

            <g transform="translate(91, 40) rotate(45)">
                <rect x="0" y="0" width="5" height="11" rx="2.5" stroke="#167981" stroke-width="1"/>
                <line x1="0" y1="5.5" x2="5" y2="5.5" stroke="#167981" stroke-width="1"/>
            </g>
            <path d="M92,101 C90,98 87,98 86,100 C85,102 87,105 92,108 C97,105 99,102 98,100 C97,98 94,98 92,101 Z" fill="#167981" stroke="none"/>
        </svg>
    </div>

    <div class="box">

        <h2>CAREFIND</h2>
        <div class="subtitle">Connecting Healthcare</div>

        <form method="POST">

            <div class="input-wrapper">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Full Name" required>
            </div>

            <div class="input-wrapper">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Email" required>
            </div>

            <div class="input-wrapper">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit">
                Create Account
            </button>

        </form>

        <div class="footer-links">
            Already have an account? <a href="/login">Login</a>
        </div>

    </div>

</body>

</html>
